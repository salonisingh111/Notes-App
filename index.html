<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2>Notes App</h2>
      <div class="note-list"></div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <div class="topbar">
        <h1>NOTES APP</h1>
        <button id="dark">dark mode</button>
      </div>

      <!-- EDITOR -->
      <section id="editor">
        <h3>Title:</h3>
        <input id="titleInput" type="text" placeholder="Enter title">
        <textarea id="noteInput" placeholder="Write your notes here..."></textarea>
        <button id="addBtn">Add Note</button>
      </section>

      <!-- NOTES (JS will inject note-card divs here) -->
      <section id="notesGrid"></section>
      <div class="overlay"></div>
    </main>
  </div>
</body>

<script>
  let dark = document.getElementById("dark");
  let titleInput = document.getElementById("titleInput");
  let noteInput = document.getElementById("noteInput");
  let addBtn = document.getElementById("addBtn");
  let notesGrid = document.getElementById("notesGrid");
  let noteList = document.querySelector(".note-list");

  /* ---------- DARK MODE ---------- */
  let isDark = JSON.parse(localStorage.getItem("dark"));
  if (isDark) {
    document.body.classList.add("dark");
  }

  dark.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    localStorage.setItem(
      "dark",
      JSON.stringify(document.body.classList.contains("dark"))
    );
  });

  /* ---------- NOTES ---------- */

  let notes = JSON.parse(localStorage.getItem("notes")) || [];
  notes.forEach(noteObj => {
    createNote(noteObj);
  });

  addBtn.addEventListener("click", () => {
    let title = titleInput.value;
    let note = noteInput.value;

    if (note === "") {
      alert("please write your notes");
      return;
    }

    let noteObj = {
      id: Date.now(),       // unique ID
      title: title || "Untitled",
      text: note
    };

    notes.push(noteObj);
    localStorage.setItem("notes", JSON.stringify(notes));

    createNote(noteObj);
    titleInput.value = "";
    noteInput.value = "";
  });

  /* ---------- CREATE NOTE CARD ---------- */
  function createNote(noteObj) {

    let noteCard = document.createElement("div");
    noteCard.classList.add("note-card");
    noteCard.dataset.id = noteObj.id;

    let h4 = document.createElement("h4");
    h4.innerText = noteObj.title;

    let p = document.createElement("p");
    p.innerText = noteObj.text;

    let noteAction = document.createElement("div");
    noteAction.classList.add("note-actions");

    let del = document.createElement("button");
    del.classList.add("delete");
    del.innerText = "Delete";

    del.addEventListener("click", () => {
      notes = notes.filter(n => n.id !== noteObj.id);
      localStorage.setItem("notes", JSON.stringify(notes));
      noteCard.remove();
      sidebarItem.remove();
    });
    noteAction.appendChild(del);

    noteCard.appendChild(h4);
    noteCard.appendChild(p);
    noteCard.appendChild(noteAction);

    notesGrid.appendChild(noteCard);


    let sidebarItem = document.createElement("div");
    sidebarItem.className = "sidebar-item";
    sidebarItem.dataset.id = noteObj.id;
    sidebarItem.innerText = noteObj.title;

    noteList.appendChild(sidebarItem);
  }

  // sidebar


</script>

</html>
